<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>银丰医院经营日报 | 2026年06月29日</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; padding: 12px; }
.container { max-width: 1000px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #1a73e8, #4285f4); color: #fff; padding: 18px 20px; border-radius: 12px; margin-bottom: 14px; position: relative; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .meta { font-size: 12px; opacity: 0.85; margin-top: 4px; }
.nav-back { position: absolute; top: 14px; right: 16px; display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; background: rgba(255,255,255,0.2); border-radius: 6px; color: #fff; text-decoration: none; font-size: 12px; backdrop-filter: blur(4px); transition: background .2s; }
.nav-back:hover { background: rgba(255,255,255,0.35); }
.nav-row { display: flex; justify-content: space-between; margin-bottom: 14px; }
.nav-link { display: inline-block; padding: 6px 14px; background: #fff; border-radius: 8px; color: #1a73e8; text-decoration: none; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.nav-link.disabled { color: #ccc; pointer-events: none; }
.kpi-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.kpi-card { flex: 1 1 calc(50% - 5px); min-width: 0; background: #fff; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.kpi-card .label { font-size: 11px; color: #888; margin-bottom: 3px; }
.kpi-card .value { font-size: 22px; font-weight: 700; color: #1a73e8; }
.kpi-card .sub { font-size: 11px; color: #666; margin-top: 3px; }
.kpi-card .up { color: #34a853; }
.kpi-card .down { color: #ea4335; }
.card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
.chart-box { width: 100%; height: 300px; }
.chart-box-sm { width: 100%; height: 280px; }
.chart-row { display: flex; flex-wrap: wrap; gap: 14px; }
.chart-row .card { flex: 1 1 calc(50% - 7px); min-width: 0; margin-bottom: 0; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; padding: 0 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 12px; position: sticky; top: 0; }
tr:hover { background: #f8f9fa; }
.alert-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.alert-item { flex: 1 1 100%; padding: 10px 14px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
.alert-red { background: #fce8e6; border-left: 3px solid #d93025; }
.alert-green { background: #e6f4ea; border-left: 3px solid #1e8e3e; }
.alert-yellow { background: #fef7e0; border-left: 3px solid #e37400; }
.badge-up { background: #e6f4ea; color: #1e8e3e; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.badge-warn { background: #fef7e0; color: #e37400; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.badge-green { background: #e8f5e9; color: #2e7d32; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.footer { text-align: center; font-size: 11px; color: #aaa; padding: 12px 0; }
.scroll-hint { display: none; font-size: 11px; color: #999; text-align: right; margin-bottom: 4px; }
@media (min-width: 601px) {
  body { padding: 20px; }
  .header { padding: 24px 32px; margin-bottom: 20px; }
  .header h1 { font-size: 22px; }
  .header .meta { font-size: 13px; margin-top: 6px; }
  .kpi-row { gap: 16px; margin-bottom: 20px; }
  .kpi-card { flex: 1; padding: 18px 20px; }
  .kpi-card .label { font-size: 12px; }
  .kpi-card .value { font-size: 26px; }
  .kpi-card .sub { font-size: 12px; }
  .card { padding: 20px 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 10px; }
  .chart-box { height: 320px; }
  table { font-size: 13px; }
  th, td { padding: 8px 12px; }
  .alert-item { flex: 1; font-size: 13px; }
  .alert-row { gap: 12px; margin-bottom: 12px; }
}
@media (max-width: 600px) {
  .kpi-card .value { font-size: 20px; }
  .chart-box { height: 260px; }
  .chart-box-sm { height: 280px; }
  .scroll-hint { display: block; }
  table { font-size: 12px; }
  th, td { padding: 6px 8px; }
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <a href="index.html" class="nav-back">← 汇总</a>
  <h1>银丰医院经营日报</h1>
  <div class="meta">2026年06月29日（周一）</div>
</div>

<div class="nav-row">
  <span class="nav-link disabled">已是第一天</span>
  <a href="0630.html" class="nav-link">后一天 →</a>
</div>

<!-- KPI Cards -->
<div class="kpi-row">

  <div class='kpi-card'>
    <div class='label'>当日营收</div>
    <div class='value'>77.78<span style='font-size:14px;color:#888'>万</span></div>
    <div class='sub'>vs目标41.94万 <span class='up'>+35.84万</span></div>
  </div>
  <div class='kpi-card'>
    <div class='label'>当月累计</div>
    <div class='value'>77.78<span style='font-size:14px;color:#888'>万</span></div>
    <div class='sub'>6月累计</div>
  </div>
  <div class='kpi-card'>
    <div class='label'>累计日均</div>
    <div class='value'>77.78<span style='font-size:14px;color:#888'>万</span></div>
    <div class='sub'>29天平均</div>
  </div>
  <div class='kpi-card'>
    <div class='label'>状态</div>
    <div class='value' style='font-size:18px;color:#888'>历史数据</div>
    <div class='sub'>不纳入7月考核</div>
  </div>

</div>

<!-- Trend Chart -->
<div class="card">
  <h2>📈 营收趋势</h2>
  <div id="trendChart" class="chart-box"></div>
</div>




<div class="chart-row">
  <div class="card">
    <h2>💊 当月累计收入结构</h2>
    <div id="structChart" class="chart-box-sm"></div>
  </div>
  
  <div class="card">
    <h2>📊 月度达成进度</h2>
    <div id="progressChart" class="chart-box-sm"></div>
  </div>
</div>



<!-- Alerts -->
<div class="card">
  <h2>⚠️ 异常预警</h2>
  <div class="alert-row">
    <div class="alert-item alert-yellow">
      <b>6月数据</b>：历史数据，不纳入7月考核
    </div>
  </div>
</div>

<div class="footer">数据来源：HIS系统 + WPS健管中心报表 | 报告时间：2026年06月29日</div>

</div>

<script>
function isMobile() { return window.innerWidth <= 600; }

// Trend Chart
var trendChart = echarts.init(document.getElementById('trendChart'));
trendChart.setOption({
  tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br/>' + p.map(s => s.marker + s.seriesName + ': ' + s.value + '万').join('<br/>'); } },
  legend: { data: ["日营收", "目标日均", "7月均值"], top: 5, textStyle: { fontSize: isMobile() ? 10 : 12 } },
  grid: { left: isMobile() ? 40 : 50, right: isMobile() ? 15 : 30, bottom: 35, top: 45 },
  xAxis: { type: 'category', data: ["29/\u5468\u4e00"], axisLabel: { fontSize: isMobile() ? 10 : 11 } },
  yAxis: { type: 'value', name: '万元', min: 36, max: 82, axisLabel: { formatter: '{value}', fontSize: isMobile() ? 10 : 11 } },
  series: [
    { name: '日营收', type: 'line', data: [77.78],
      smooth: true, symbol: 'circle', symbolSize: isMobile() ? 6 : 8,
      lineStyle: { width: 3, color: '#1a73e8' },
      itemStyle: { color: '#1a73e8' },
      areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(26,115,232,0.25)' }, { offset: 1, color: 'rgba(26,115,232,0.02)' }]) },
      markPoint: { data: [{ type: 'max', name: '最高' }, { type: 'min', name: '最低' }], symbolSize: isMobile() ? 32 : 40, label: { fontSize: 9 } }
    }
    ,{ name: '目标日均', type: 'line', data: [41.94],
      lineStyle: { width: 2, type: 'dashed', color: '#ea4335' }, itemStyle: { color: '#ea4335' }, symbol: 'none'
    },
    { name: '7月均值', type: 'line', data: [77.78],
      lineStyle: { width: 1.5, type: 'dotted', color: '#34a853' }, itemStyle: { color: '#34a853' }, symbol: 'none'
    }
  ]
});

var structChart = echarts.init(document.getElementById('structChart'));
structChart.setOption({
  tooltip: { trigger: 'item', formatter: '{b}: {c}万 ({d}%)', position: function(point, params, dom, rect, size) { return [point[0] - size.contentSize[0] / 2, point[1] - size.contentSize[1] - 15]; } },
  legend: { 
    orient: isMobile() ? 'horizontal' : 'vertical', 
    left: isMobile() ? 'center' : 'auto',
    right: isMobile() ? 'auto' : 10, 
    bottom: isMobile() ? 5 : 'auto',
    top: isMobile() ? 'auto' : 'center', 
    textStyle: { fontSize: isMobile() ? 10 : 11 } 
  },
  series: [{
    type: 'pie', radius: ['35%', '65%'], center: isMobile() ? ['50%', '40%'] : ['35%', '50%'],
    label: { show: false },
    data: [{ value: 0, name: '药品', itemStyle: { color: '#1a73e8' } },
      { value: 0, name: '耗材', itemStyle: { color: '#4285f4' } },
      { value: 0, name: '检查', itemStyle: { color: '#34a853' } },
      { value: 0, name: '治疗', itemStyle: { color: '#fbbc04' } },
      { value: 0, name: '其他', itemStyle: { color: '#9aa0a6' } }
    ]
  }]
});


var progressChart = echarts.init(document.getElementById('progressChart'));
progressChart.setOption({
  series: [
    { type: 'gauge', startAngle: 200, endAngle: -20, min: 0, max: 100,
      radius: '90%', center: ['50%', '60%'],
      pointer: { show: false },
      progress: { show: true, overlap: false, roundCap: true, clip: false,
        itemStyle: { color: '#1a73e8' }
      },
      axisLine: { lineStyle: { width: 18, color: [[1, '#e8eaed']] } },
      axisTick: { show: false }, splitLine: { show: false },
      axisLabel: { show: false },
      detail: { show: false },
      data: [{ value: 0 }]
    },
    { type: 'gauge', startAngle: 200, endAngle: -20, min: 0, max: 100,
      radius: '90%', center: ['50%', '60%'],
      pointer: { show: false },
      progress: { show: true, overlap: false, roundCap: true, clip: false,
        itemStyle: { color: '#34a853' }
      },
      axisLine: { lineStyle: { width: 10, color: [[1, '#e8eaed']] } },
      axisTick: { show: false }, splitLine: { show: false },
      axisLabel: { show: false },
      detail: { fontSize: 20, fontWeight: 'bold', offsetCenter: [0, '10%'],
        formatter: function(v) { return ''; }
      },
      data: [{ value: 0 }]
    }
  ],
  graphic: [
    { type: 'text', left: 'center', top: '30%',
      style: { text: '达成 0%', fontSize: isMobile() ? 14 : 16, fontWeight: 'bold', fill: '#1a73e8' } },
    { type: 'text', left: 'center', top: '48%',
      style: { text: '时间 0%', fontSize: isMobile() ? 11 : 12, fill: '#888' } }
  ]
});
</script>
</body>
</html>
